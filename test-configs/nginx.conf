# Test nginx config with known security issues for plugin development

http {
    server {
        listen 80;
        server_name example.com;

        # Should trigger: version_disclosure (HIGH)
        server_tokens on;

        # Should trigger: add_header_multiline or similar
        add_header X-Frame-Options "";

        location / {
            proxy_pass http://backend;
        }

        # Should trigger: ssrf if using variables
        location ~ /proxy/(.*) {
            proxy_pass http://$1;
        }
    }
}
